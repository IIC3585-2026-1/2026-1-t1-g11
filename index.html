<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Trabajo 1 - CSS - GRUPO 11</title>
</head>
<body>
    <div class="header">
        <h1 class="titulo">Trabajo 1</h1>
        <h3 class="subtitulo"> CSS - Grupo 11</h3>
    </div>
    <div class="flex-container">

        <h2 class="titulo">Transformaciones</h2>

        <!-- Contenedor para las transformaciones -->
        <div class="transform-container">

            <!-- Contenedor para la prueba de tamaño -->
            <div class="test-container">
                <div class="show">
                    <div class="square">
                        <div id="innerSquare" class="inner-square"></div>
                    </div>
                </div>
                <div class="test">
                    <p>Tamaño</p>
                    <input
                        id="sizeSlider"
                        type="range"
                        min="10"
                        max="100"
                        value="50"
                        oninput="updateSquareSize(this.value)"
                    >
                </div>
            </div>

            <!-- Contenedor para la prueba de rotación -->
            <div class="test-container">
                <div class="show">
                    <div id="rotatingSquare" class="rotating-square">
                    </div>
                </div>
                <div class="test">
                    <p>Rotacion</p>
                    <input
                        id="rotationSlider"
                        type="range"
                        min="0"
                        max="360"
                        value="0"
                        oninput="updateSquareRotation(this.value)"
                    >
                </div>
            </div>

            <!-- Contenedor para la prueba de traslación -->
            <div class="test-container">
                <div class="show">
                    <div id="translatingSquare" class="translating-square">
                    </div>
                </div>
                <div class="test">
                    <p>Traslacion</p>
                    <input
                        id="translationSlider"
                        type="range"
                        min="-100"
                        max="100"
                        value="0"
                        oninput="updateSquareTranslation(this.value)"
                    >
                </div>
            </div>

        </div>

        <h2>Animaciones</h2>

        <!-- Contenedor para la animación -->
        <div class="animation-container">
            <div class="test-container">
                <div class="show">
                    <div class="animation-track">
                        <div id="animatedSquare" class="animated-square"></div>
                    </div>
                </div>
                <div class="test">
                    <button id="animationButton" onclick="startLoopAnimation()">¡Animacíon!</button>
                </div>
            </div>
        </div>

        <h2>Transiciones</h2>

        <div class="transition-container">
            
            <!-- Contenedor para la transicion de opacidad -->
            <div class="test-container">
                <div class="show">
                    <div class="square-opacity"></div>
                </div>
                <div class="test">
                    <p>Opacidad</p>
                </div>
            </div>

            <!-- Contenedor para la transicion de color -->
            <div class="test-container">
                <div class="show">
                    <div class="square-color"></div>
                </div>
                <div class="test">
                    <p>Color</p>
                </div>
            </div>

            <!-- Contenedor para la transicion de tamaño -->
            <div class="test-container">
                <div class="show">
                    <div class="square">
                        <div class="square-size"></div>
                    </div>
                </div>
                <div class="test">
                    <p>Tamaño</p>
                </div>
            </div>

        </div>

    </div>

    <script>

        let isAnimating = false;

        // Función para actualizar el tamaño del cuadrado interno
        function updateSquareSize(size) {
            const innerSquare = document.getElementById('innerSquare');
            innerSquare.style.width = `${size}%`;
            innerSquare.style.height = `${size}%`;
        }

        // Función para actualizar la rotación del cuadrado
        function updateSquareRotation(angle) {
            const square = document.getElementById('rotatingSquare');
            square.style.transform = `rotate(${angle}deg)`;
        }

        // Funcion para actualizar la traslación del cuadrado
        function updateSquareTranslation(value) {
            const square = document.getElementById('translatingSquare');
            square.style.transform = `translateX(${value}px)`;
        }

        // Función para iniciar o detener la animación de bucle
        function startLoopAnimation() {
            const square = document.getElementById('animatedSquare');
            const animationButton = document.getElementById('animationButton');

            if (!isAnimating) {
                square.classList.add('animated-square-loop');
                animationButton.textContent = 'No animacíon :(';
                isAnimating = true;
            } else {
                square.classList.remove('animated-square-loop');
                animationButton.textContent = '¡Animacíon!';
                isAnimating = false;
            }
        }

        updateSquareSize(document.getElementById('sizeSlider').value);
        updateSquareRotation(document.getElementById('rotationSlider').value);
    </script>
</body>
</html>
